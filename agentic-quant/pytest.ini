# AGENTIC-QUANT — pytest configuration

[pytest]
minversion = 8.0
testpaths = tests/unit tests/integration
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
junit_family = xunit2

addopts =
    -ra
    --strict-markers
    --tb=short
    --color=yes

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    backtest: marks tests as backtest scenario tests
    unit: marks tests as unit tests
    ml: marks tests as ML model tests (may require GPU)
    benchmark: marks tests as benchmark tests

filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
